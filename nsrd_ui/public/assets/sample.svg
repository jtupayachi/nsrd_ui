<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple mockup template -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="80" fill="#667eea"/>
  <text x="400" y="45" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Page Title</text>
  
  <!-- Main Content Area -->
  <rect x="20" y="100" width="760" height="460" fill="white" stroke="#ddd" stroke-width="2" rx="8"/>
  
  <!-- Left Panel - Controls -->
  <rect x="40" y="120" width="200" height="400" fill="#f9f9f9" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="140" y="145" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Controls</text>
  
  <!-- Control boxes -->
  <rect x="50" y="160" width="180" height="40" fill="white" stroke="#999" stroke-width="1" rx="3"/>
  <text x="140" y="185" font-size="12" fill="#666" text-anchor="middle">Dropdown Menu</text>
  
  <rect x="50" y="210" width="180" height="40" fill="white" stroke="#999" stroke-width="1" rx="3"/>
  <text x="140" y="235" font-size="12" fill="#666" text-anchor="middle">Date Picker</text>
  
  <rect x="50" y="260" width="180" height="40" fill="white" stroke="#999" stroke-width="1" rx="3"/>
  <text x="140" y="285" font-size="12" fill="#666" text-anchor="middle">Filter Options</text>
  
  <!-- Right Panel - Data Visualization -->
  <rect x="260" y="120" width="500" height="400" fill="white" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="510" y="145" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">Data Visualization</text>
  
  <!-- Chart placeholder -->
  <rect x="280" y="170" width="460" height="200" fill="#e8f4f8" stroke="#999" stroke-width="1" rx="3"/>
  <text x="510" y="270" font-size="16" fill="#666" text-anchor="middle">Chart / Graph Area</text>
  
  <!-- Table placeholder -->
  <rect x="280" y="390" width="460" height="110" fill="#f9f9f9" stroke="#999" stroke-width="1" rx="3"/>
  <text x="510" y="450" font-size="14" fill="#666" text-anchor="middle">Data Table</text>
  
  <!-- Footer -->
  <rect x="0" y="570" width="800" height="30" fill="#444"/>
  <text x="400" y="590" font-size="12" fill="white" text-anchor="middle">Footer Information</text>
</svg>
