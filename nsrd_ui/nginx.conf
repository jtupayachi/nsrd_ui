worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    access_log /var/log/nginx/access.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    server {
        listen 80;
        server_name demo2.recoil.ise.utk.edu localhost;

        root /app/build;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API to Node backend (streaming-safe)
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Pipeline SSE endpoint — large models can take 3+ min to load; extend timeouts
        location /api/pipeline/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 1800s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            # Tell any upstream CDN/proxy this is a live stream
            add_header X-Accel-Buffering no;
            add_header Cache-Control no-cache;
        }
    }
}
