  <text x="1700" y="454" text-anchor="middle" fill="#666" font-size="13">Verified component patterns: maps, charts, dashboards, data tables</text>
  <text x="1700" y="472" text-anchor="middle" fill="#999" font-size="12" font-style="italic">Indexed at startup; cached across container restarts</text>

  <text x="1710" y="520" text-anchor="middle" fill="#999" font-size="13" font-style="italic">sentence-transformers  |  faiss-cpu  |  numpy  |  http.server</text>

