  <rect x="700" y="314" width="296" height="92" rx="5" fill="#ffffff" stroke="#dd8452" stroke-width="1"/>
  <text x="848" y="336" text-anchor="middle" fill="#333" font-size="15" font-weight="600">Code Generation Pipeline</text>
  <text x="848" y="356" text-anchor="middle" fill="#666" font-size="13">1. Prompt to LLM  (streaming)</text>
  <text x="848" y="374" text-anchor="middle" fill="#666" font-size="13">2. File extraction and scaffolding</text>
  <text x="848" y="392" text-anchor="middle" fill="#666" font-size="13">3. Vite build  |  4. Auto-repair loop</text>
  <rect x="700" y="408" width="210" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="805" y="420" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Automated Error Correction</text>

