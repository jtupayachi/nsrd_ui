  <text x="1261" y="622" text-anchor="middle" fill="#333" font-size="14" font-weight="600">Mistral</text>

  <rect x="1342" y="596" width="156" height="42" rx="5" fill="#ffffff" stroke="#64b5cd" stroke-width="1"/>
  <text x="1420" y="622" text-anchor="middle" fill="#333" font-size="14" font-weight="600">DeepSeek v2</text>

  <!-- Thinker Model (highlighted) -->
  <rect x="1050" y="648" width="448" height="48" rx="5" fill="#ffffff" stroke="#4c72b0" stroke-width="1.8"/>
  <text x="1274" y="668" text-anchor="middle" fill="#333" font-size="15" font-weight="700">Thinker Model: Qwen3-next</text>
  <text x="1274" y="688" text-anchor="middle" fill="#4c72b0" font-size="13" font-style="italic">Deep reasoning for architectural decisions and code planning</text>
  <rect x="1510" y="650" width="240" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="1630" y="662" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Deep-Reasoning Thinker Model</text>

  <!-- Scaling note -->
  <text x="1350" y="760" text-anchor="middle" fill="#888" font-size="13" font-style="italic">GPU-accelerated  |  parallel multi-user serving  |  PagedAttention memory management</text>
  <rect x="706" y="710" width="220" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="816" y="722" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Scalable Inference  |  Multi-GPU</text>

  <!-- Arrow: Backend to Inference -->
  <path d="M 960 536 L 960 546 Q 960 553 975 556 L 1040 594" fill="none" stroke="#64b5cd" stroke-width="3" stroke-dasharray="7,4" marker-end="url(#arrowTeal)"/>
  <text x="985" y="552" fill="#64b5cd" font-size="13" font-weight="600">Streaming generation</text>

