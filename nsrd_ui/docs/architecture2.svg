  <rect x="60" y="572" width="570" height="8" fill="#8c8c8c"/>
  <text x="345" y="575" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing="0.5">PERSISTENT DOCKER VOLUMES</text>

  <rect x="82" y="594" width="240" height="58" rx="5" fill="#ffffff" stroke="#8c8c8c" stroke-width="1"/>
  <text x="202" y="619" text-anchor="middle" fill="#333" font-size="15" font-weight="600">projects_data</text>
  <text x="202" y="639" text-anchor="middle" fill="#777" font-size="13">Generated applications</text>

  <rect x="340" y="594" width="240" height="58" rx="5" fill="#ffffff" stroke="#8c8c8c" stroke-width="1"/>
  <text x="460" y="619" text-anchor="middle" fill="#333" font-size="15" font-weight="600">rag_cache</text>
  <text x="460" y="639" text-anchor="middle" fill="#777" font-size="13">FAISS index, embeddings</text>

  <rect x="82" y="664" width="170" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="167" y="676" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Persistent Volumes</text>
  <text x="345" y="752" text-anchor="middle" fill="#999" font-size="13" font-style="italic">Survive container restarts  |  Bind-mount for development</text>

