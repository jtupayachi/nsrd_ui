  <text x="1162" y="336" text-anchor="middle" fill="#333" font-size="15" font-weight="600">Async Event Controller</text>
  <text x="1162" y="356" text-anchor="middle" fill="#666" font-size="13">Server-Sent Events (SSE)</text>
  <text x="1162" y="374" text-anchor="middle" fill="#666" font-size="13">Request deduplication</text>
  <text x="1162" y="392" text-anchor="middle" fill="#666" font-size="13">Buffered replay on reconnect</text>
  <rect x="1014" y="408" width="210" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="1119" y="420" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Resilient Event Streaming</text>

