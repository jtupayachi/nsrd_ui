  <!-- ════════ INLINE ARROW LEGEND (top-right corner) ════════ -->
  <rect x="1060" y="40" width="980" height="95" rx="8" fill="#ffffff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <rect x="1060" y="40" width="980" height="22" rx="8" fill="#e8e8e8"/>
