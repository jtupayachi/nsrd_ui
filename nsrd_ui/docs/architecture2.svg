  <rect x="680" y="276" width="660" height="24" rx="8" fill="#dd8452"/>
  <rect x="680" y="292" width="660" height="8" fill="#dd8452"/>
  <text x="1010" y="295" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing="0.5">APPLICATION LAYER — Node.js / Express (Port 3001)</text>

