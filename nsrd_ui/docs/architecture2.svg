<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 820" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4c72b0"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64b5cd"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44e52"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dd8452"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8c8c8c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="2100" height="820" fill="#ffffff"/>

  <!-- ════════ USERS ════════ -->
  <rect x="45" y="40" width="370" height="95" rx="8" fill="#ffffff" stroke="#8c8c8c" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="45" y="40" width="370" height="26" rx="8" fill="#8c8c8c"/>
  <rect x="45" y="56" width="370" height="10" fill="#8c8c8c"/>
  <text x="230" y="60" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing="1">USERS</text>
  <text x="140" y="92" text-anchor="middle" fill="#333" font-size="17" font-weight="600">Researcher</text>
  <text x="320" y="92" text-anchor="middle" fill="#333" font-size="17" font-weight="600">Administrator</text>
  <text x="230" y="118" text-anchor="middle" fill="#888" font-size="14">Role-based project isolation</text>

  <!-- ════════ TLS EDGE ════════ -->
  <rect x="500" y="40" width="450" height="95" rx="8" fill="#ffffff" stroke="#ccb974" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="500" y="40" width="450" height="26" rx="8" fill="#ccb974"/>
  <rect x="500" y="56" width="450" height="10" fill="#ccb974"/>
  <text x="725" y="60" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing="1">TLS TERMINATION LAYER</text>
  <text x="725" y="92" text-anchor="middle" fill="#333" font-size="17" font-weight="600">nginx-proxy + Let's Encrypt</text>
  <text x="725" y="115" text-anchor="middle" fill="#888" font-size="14">HTTPS :443  /  Auto-certificate renewal</text>
  <rect x="512" y="120" width="160" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="592" y="132" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">TLS + Authentication</text>

  <!-- Arrow: Users to Edge -->
  <line x1="415" y1="88" x2="498" y2="88" stroke="#4c72b0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="456" y="80" text-anchor="middle" fill="#4c72b0" font-size="13" font-weight="600">HTTPS</text>

  <!-- ════════ DOCKER CONTAINER BOUNDARY ════════ -->
  <rect x="45" y="162" width="2010" height="630" rx="10" fill="none" stroke="#4c72b0" stroke-width="4" stroke-dasharray="12,6"/>
  <rect x="62" y="150" width="560" height="24" rx="5" fill="#ffffff"/>
  <text x="70" y="169" fill="#4c72b0" font-size="16" font-weight="700" letter-spacing="1">DOCKER CONTAINER  —  nsrd-ui</text>
  <rect x="520" y="154" width="240" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="640" y="150" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Containerized  |  Single-command deploy</text>

  <!-- Arrow: Edge to Nginx -->
  <line x1="725" y1="135" x2="725" y2="183" stroke="#ccb974" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ════════ NGINX ════════ -->
  <rect x="62" y="186" width="1975" height="72" rx="8" fill="#ffffff" stroke="#4c72b0" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="62" y="186" width="1975" height="24" rx="8" fill="#4c72b0"/>
  <rect x="62" y="202" width="1975" height="8" fill="#4c72b0"/>
  <text x="1049" y="205" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">NGINX REVERSE PROXY (PORT 80)</text>
  <text x="1049" y="228" text-anchor="middle" fill="#444" font-size="14">Static SPA serving  |  /api/* proxied to Express</text>
  <text x="1049" y="248" text-anchor="middle" fill="#666" font-size="13">Event-stream passthrough (1800 s timeout)  |  gzip compression</text>

  <!-- ════════ FRONTEND ════════ -->
  <rect x="60" y="276" width="570" height="260" rx="8" fill="#ffffff" stroke="#8172b3" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="60" y="276" width="570" height="24" rx="8" fill="#8172b3"/>
  <rect x="60" y="292" width="570" height="8" fill="#8172b3"/>
  <text x="345" y="295" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" letter-spacing="0.5">PRESENTATION LAYER — React / TypeScript</text>

  <rect x="80" y="314" width="162" height="58" rx="5" fill="#ffffff" stroke="#8172b3" stroke-width="1"/>
  <text x="161" y="340" text-anchor="middle" fill="#333" font-size="15" font-weight="600">File Upload</text>
  <text x="161" y="360" text-anchor="middle" fill="#777" font-size="13">Drag-and-drop</text>

  <rect x="258" y="314" width="162" height="58" rx="5" fill="#ffffff" stroke="#8172b3" stroke-width="1"/>
  <text x="339" y="340" text-anchor="middle" fill="#333" font-size="15" font-weight="600">Model Selector</text>
  <text x="339" y="360" text-anchor="middle" fill="#777" font-size="13">Multi-LLM</text>

  <rect x="436" y="314" width="162" height="58" rx="5" fill="#ffffff" stroke="#8172b3" stroke-width="1"/>
  <text x="517" y="340" text-anchor="middle" fill="#333" font-size="15" font-weight="600">Live Preview</text>
  <text x="517" y="360" text-anchor="middle" fill="#777" font-size="13">Iframe + SSE</text>

  <rect x="80" y="382" width="190" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="175" y="394" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">User and Project Isolation</text>
  <text x="345" y="516" text-anchor="middle" fill="#999" font-size="13" font-style="italic">react-app-rewired  |  Vite  |  Tailwind CSS</text>

  <!-- Arrow: Nginx to Frontend -->
  <line x1="345" y1="258" x2="345" y2="274" stroke="#4c72b0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="390" y="268" text-anchor="middle" fill="#4c72b0" font-size="13">Static files</text>

  <!-- ════════ BACKEND ════════ -->
