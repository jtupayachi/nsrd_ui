  <text x="1843" y="358" text-anchor="middle" fill="#666" font-size="13">Approximate nearest</text>
  <text x="1843" y="374" text-anchor="middle" fill="#666" font-size="13">neighbor search</text>
  <rect x="1420" y="388" width="260" height="16" rx="3" fill="#55a868" opacity="0.12"/>
  <text x="1550" y="400" text-anchor="middle" fill="#55a868" font-size="12" font-weight="600">Retrieval-Augmented Generation</text>

