  <rect x="1014" y="436" width="296" height="48" rx="5" fill="#ffffff" stroke="#c44e52" stroke-width="1"/>
  <text x="1162" y="458" text-anchor="middle" fill="#333" font-size="15" font-weight="600">Reference Analyzer</text>
  <text x="1162" y="476" text-anchor="middle" fill="#666" font-size="13">RAG-first  |  Keyword fallback</text>

  <text x="1010" y="520" text-anchor="middle" fill="#999" font-size="13" font-style="italic">express  |  axios  |  child_process  |  crypto</text>

