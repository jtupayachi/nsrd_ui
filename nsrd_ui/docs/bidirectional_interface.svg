  <!-- ═══ HIGHLIGHTED CONTAMINATION ZONE ═══ -->
  <polygon points="180,600 280,570 360,590 340,680 240,700 170,660" fill="#ef4444" fill-opacity="0.18" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#glow)"/>
  <text x="265" y="640" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="700">Contamination</text>
  <text x="265" y="660" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="700">Zone</text>

  <!-- Remediation highlighted area -->
