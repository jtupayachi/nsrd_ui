<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow-md" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="blue600" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- bg-slate-50 -->
  <rect width="1300" height="900" rx="12" fill="#f8fafc"/>

  <!-- ── Navbar ── -->
  <rect width="1300" height="64" fill="white"/>
  <line x1="0" y1="64" x2="1300" y2="64" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="28" y="16" width="32" height="32" rx="8" fill="#2563eb"/>
  <text x="44" y="39" text-anchor="middle" fill="white" font-size="20" font-weight="700">E</text>
  <text x="72" y="42" fill="#0f172a" font-size="26" font-weight="700" letter-spacing="-0.5">DOE EM</text>
  <text x="196" y="42" fill="#64748b" font-size="26" font-weight="400">Decision Support</text>
  <text x="820" y="42" fill="#64748b" font-size="22" font-weight="500">Dashboard</text>
  <text x="980" y="42" fill="#2563eb" font-size="22" font-weight="600">Chat</text>
  <rect x="972" y="52" width="48" height="3" rx="1.5" fill="#2563eb"/>
  <text x="1080" y="42" fill="#64748b" font-size="22" font-weight="500">Scenarios</text>
  <circle cx="1256" cy="32" r="20" fill="#e2e8f0"/>
  <text x="1256" y="39" text-anchor="middle" fill="#64748b" font-size="18" font-weight="600">JD</text>

  <!-- ══════════ LEFT TOP — Compact Scenario Config ══════════ -->
  <rect x="28" y="84" width="580" height="280" rx="16" fill="white" filter="url(#shadow-md)"/>
  <text x="52" y="120" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.5">Scenario Config</text>
  <rect x="340" y="100" width="90" height="30" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="358" cy="115" r="4" fill="#22c55e"/>
  <text x="370" y="122" fill="#16a34a" font-size="16" font-weight="600">Active</text>
  <!-- Details button -->
  <rect x="444" y="100" width="140" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="514" y="121" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="600">&#x25B8; Show Details</text>
  <line x1="52" y1="136" x2="584" y2="136" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="52" y="162" fill="#94a3b8" font-size="18">Contaminant (mg/L)</text>
  <rect x="52" y="170" width="280" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="72" y="198" fill="#0f172a" font-size="22" font-weight="500">0.45</text>
  <text x="346" y="162" fill="#94a3b8" font-size="18">Strategy</text>
  <rect x="346" y="170" width="238" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="366" y="198" fill="#334155" font-size="20">Pump-and-treat &#x25BE;</text>

  <!-- Row 2 -->
