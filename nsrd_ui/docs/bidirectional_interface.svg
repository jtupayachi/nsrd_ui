  <text x="485" y="660" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">Remediation</text>
  <text x="485" y="676" text-anchor="middle" fill="#d97706" font-size="14" font-weight="600">Active</text>

  <!-- Well markers -->
  <circle cx="200" cy="620" r="10" fill="white" stroke="#dc2626" stroke-width="2.5"/>
  <text x="200" y="626" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700">7</text>
  <text x="218" y="614" fill="#dc2626" font-size="14" font-weight="600">0.3 mg/L</text>

  <circle cx="310" cy="650" r="10" fill="white" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="310" y="656" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">4</text>
  <text x="328" y="644" fill="#d97706" font-size="14" font-weight="600">0.45 mg/L</text>

  <circle cx="160" cy="510" r="10" fill="white" stroke="#22c55e" stroke-width="2.5"/>
  <text x="160" y="516" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">2</text>
  <text x="178" y="504" fill="#16a34a" font-size="14" font-weight="600">0.08 mg/L</text>

  <!-- Buildings -->
  <rect x="120" y="470" width="50" height="35" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="145" y="493" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Bldg A</text>
  <rect x="400" y="470" width="50" height="35" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="425" y="493" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Bldg B</text>
  <rect x="440" y="740" width="55" height="35" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="467" y="763" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Tank F</text>

  <!-- Legend -->
  <rect x="56" y="755" width="220" height="56" rx="8" fill="white" fill-opacity="0.92" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="74" cy="772" r="5" fill="#dc2626"/>
  <text x="86" y="777" fill="#334155" font-size="13">Contamination</text>
  <circle cx="74" cy="792" r="5" fill="#f59e0b"/>
  <text x="86" y="797" fill="#334155" font-size="13">Remediation</text>
  <circle cx="178" cy="772" r="5" fill="#22c55e"/>
  <text x="190" y="777" fill="#334155" font-size="13">Clean</text>
  <rect x="170" y="786" width="16" height="10" fill="none" stroke="#8faa7e" stroke-width="1"/>
  <text x="190" y="797" fill="#334155" font-size="13">Contour</text>

  <!-- Scale bar -->
  <line x1="480" y1="800" x2="580" y2="800" stroke="#64748b" stroke-width="1.5"/>
  <line x1="480" y1="796" x2="480" y2="804" stroke="#64748b" stroke-width="1.5"/>
  <line x1="580" y1="796" x2="580" y2="804" stroke="#64748b" stroke-width="1.5"/>
  <text x="530" y="796" text-anchor="middle" fill="#64748b" font-size="13">500 m</text>

  <!-- ══════════ RIGHT PANEL — CHATBOT with TIMESTAMPS ══════════ -->
  <rect x="636" y="84" width="636" height="792" rx="16" fill="white" filter="url(#shadow-md)"/>

  <!-- Chat header -->
  <text x="664" y="122" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.5">EM Assistant</text>
  <line x1="664" y1="138" x2="1244" y2="138" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ── Message 1: User ── -->
  <text x="1232" y="162" text-anchor="end" fill="#94a3b8" font-size="14">10:32 AM</text>
  <rect x="870" y="168" width="370" height="72" rx="18" fill="#2563eb"/>
  <text x="894" y="200" fill="white" font-size="24">What's the contaminant level</text>
  <text x="894" y="228" fill="white" font-size="24">at Well-7?</text>

  <!-- ── Message 2: Bot ── -->
  <text x="664" y="256" fill="#94a3b8" font-size="14">10:32 AM · EM Assistant</text>
  <rect x="664" y="262" width="430" height="110" rx="18" fill="#f1f5f9"/>
  <text x="692" y="296" fill="#0f172a" font-size="24">The current reading at Well-7</text>
  <text x="692" y="328" fill="#0f172a" font-size="24">is 0.3 mg/L — below the</text>
  <text x="692" y="360" fill="#0f172a" font-size="24">revised threshold of 0.45.</text>
  <!-- Detail button -->
  <rect x="664" y="380" width="140" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="734" y="400" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="600">&#x1F4CA; View Data</text>

  <!-- ── Message 3: User ── -->
  <text x="1232" y="425" text-anchor="end" fill="#94a3b8" font-size="14">10:33 AM</text>
  <rect x="870" y="431" width="370" height="72" rx="18" fill="#2563eb"/>
  <text x="894" y="463" fill="white" font-size="24">Show contamination zone on</text>
  <text x="894" y="491" fill="white" font-size="24">the site map.</text>

  <!-- ── Message 4: Bot ── -->
  <text x="664" y="519" fill="#94a3b8" font-size="14">10:33 AM · EM Assistant</text>
  <rect x="664" y="525" width="430" height="80" rx="18" fill="#f1f5f9"/>
  <text x="692" y="559" fill="#0f172a" font-size="24">Highlighted on the map. Red =</text>
  <text x="692" y="591" fill="#0f172a" font-size="24">active plume, amber = remediation.</text>
  <!-- Action buttons row -->
  <rect x="664" y="613" width="130" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="729" y="633" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="600">&#x1F5FA; Zoom In</text>
  <rect x="802" y="613" width="140" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="872" y="633" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="600">&#x1F4CB; Full Report</text>
  <rect x="950" y="613" width="120" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1010" y="633" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="600">&#x21E9; Export</text>

  <!-- ── Bot — results card ── -->
  <text x="664" y="660" fill="#94a3b8" font-size="14">10:34 AM · EM Assistant</text>
  <rect x="664" y="666" width="430" height="120" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <!-- <text x="684" y="692" fill="#64748b" font-size="16" font-weight="500">&#60;SiteOverview /&#62;</text> -->
  <line x1="684" y1="700" x2="1074" y2="700" stroke="#f1f5f9" stroke-width="1"/>
  <text x="684" y="724" fill="#0f172a" font-size="22" font-weight="600">Well-7: 0.3  ·  Well-4: 0.45  ·  Well-2: 0.08</text>
  <text x="684" y="752" fill="#16a34a" font-size="20" font-weight="600">&#x2713; 2 of 3 wells below threshold</text>
  <!-- Expand button -->
  <rect x="684" y="762" width="120" height="26" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="744" y="780" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="600">Expand &#x25B8;</text>

  <!-- Provenance -->
  <text x="664" y="810" fill="#94a3b8" font-size="16">Responses versioned via W3C PROV · Audit trail active</text>

  <!-- Chat input -->
  <rect x="664" y="828" width="470" height="52" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="692" y="860" fill="#94a3b8" font-size="24">Ask a question...</text>
  <!-- Send button -->
  <circle cx="1216" cy="854" r="28" fill="url(#blue600)"/>
  <line x1="1216" y1="870" x2="1216" y2="840" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="1204,850 1216,838 1228,850" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
