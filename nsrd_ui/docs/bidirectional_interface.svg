  <rect x="52" y="244" width="160" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="72" y="272" fill="#334155" font-size="22">24 months</text>
  <rect x="228" y="250" width="40" height="22" rx="11" fill="#2563eb"/>
  <circle cx="256" cy="261" r="9" fill="white"/>
  <text x="276" y="268" fill="#334155" font-size="18">HIL</text>
  <rect x="328" y="250" width="40" height="22" rx="11" fill="#2563eb"/>
  <circle cx="356" cy="261" r="9" fill="white"/>
  <text x="376" y="268" fill="#334155" font-size="18">Audit</text>
  <rect x="444" y="244" width="140" height="42" rx="10" fill="url(#blue600)"/>
  <text x="514" y="272" text-anchor="middle" fill="white" font-size="22" font-weight="600">&#x25B6; Run</text>

  <!-- Metric pills -->
  <rect x="52" y="302" width="120" height="36" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="72" y="326" fill="#0f172a" font-size="20" font-weight="700">3</text>
  <text x="96" y="326" fill="#94a3b8" font-size="18">Wells</text>
  <rect x="184" y="302" width="160" height="36" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="204" y="326" fill="#0f172a" font-size="20" font-weight="700">0.45</text>
  <text x="248" y="326" fill="#94a3b8" font-size="18">mg/L</text>
  <rect x="356" y="302" width="120" height="36" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="376" y="326" fill="#16a34a" font-size="20" font-weight="700">&#x2713; Pass</text>
  <!-- History button -->
  <rect x="488" y="302" width="96" height="36" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="536" y="326" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="600">History &#x25B8;</text>

  <!-- ══════════ LEFT BOTTOM — GIS MAP with TOPO ══════════ -->
  <rect x="28" y="380" width="580" height="496" rx="16" fill="white" filter="url(#shadow-md)"/>
  <text x="52" y="416" fill="#0f172a" font-size="28" font-weight="700" letter-spacing="-0.5">Site Map — EM Facility</text>
  <!-- Layer buttons -->
  <rect x="370" y="396" width="62" height="28" rx="6" fill="#2563eb"/>
  <text x="401" y="416" text-anchor="middle" fill="white" font-size="14" font-weight="600">Topo</text>
  <rect x="438" y="396" width="62" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="469" y="416" text-anchor="middle" fill="#64748b" font-size="14">Layers</text>
  <rect x="506" y="396" width="78" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="416" text-anchor="middle" fill="#64748b" font-size="14">Satellite</text>
  <line x1="52" y1="432" x2="584" y2="432" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Map canvas -->
  <rect x="44" y="440" width="556" height="380" rx="12" fill="#e8efe3" stroke="#cbd5c0" stroke-width="1"/>

