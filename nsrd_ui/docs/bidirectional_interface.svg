  <!-- Elevation band fills (subtle) -->
  <path d="M44,820 Q100,780 170,790 Q260,800 340,770 Q420,750 500,780 Q560,800 600,790 L600,820 Z" fill="#d4e0cc" opacity="0.4"/>
  <path d="M44,760 Q120,720 200,740 Q300,760 380,720 Q460,700 540,730 Q580,750 600,740 L600,820 Q560,800 500,780 Q420,750 340,770 Q260,800 170,790 Q100,780 44,820 Z" fill="#c8d9be" opacity="0.3"/>
  <path d="M44,700 Q140,660 240,680 Q330,700 400,660 Q470,640 550,670 Q580,690 600,680 L600,740 Q580,750 540,730 Q460,700 380,720 Q300,760 200,740 Q120,720 44,760 Z" fill="#bcd0b2" opacity="0.25"/>

  <!-- Contour lines with elevation labels -->
  <path d="M44,790 Q100,760 180,770 Q270,790 350,755 Q430,735 510,765 Q560,780 600,775" fill="none" stroke="#8faa7e" stroke-width="1" opacity="0.7"/>
  <text x="555" y="772" fill="#6b8a5e" font-size="10" opacity="0.8">100m</text>

  <path d="M44,740 Q130,700 220,720 Q310,745 390,700 Q470,680 540,710 Q570,730 600,720" fill="none" stroke="#8faa7e" stroke-width="1" opacity="0.7"/>
  <text x="555" y="717" fill="#6b8a5e" font-size="10" opacity="0.8">150m</text>

  <path d="M44,690 Q150,650 250,670 Q340,690 410,650 Q480,630 550,660 Q580,675 600,665" fill="none" stroke="#8faa7e" stroke-width="1.2" opacity="0.8"/>
  <text x="555" y="662" fill="#6b8a5e" font-size="10" opacity="0.8">200m</text>

  <path d="M44,640 Q160,600 260,620 Q340,640 410,600 Q480,580 550,610 Q580,625 600,615" fill="none" stroke="#8faa7e" stroke-width="1" opacity="0.6"/>
  <text x="555" y="612" fill="#6b8a5e" font-size="10" opacity="0.8">250m</text>

  <path d="M44,590 Q130,560 220,570 Q310,585 390,555 Q460,540 530,565 Q570,580 600,570" fill="none" stroke="#8faa7e" stroke-width="1" opacity="0.6"/>
  <text x="555" y="567" fill="#6b8a5e" font-size="10" opacity="0.8">300m</text>

  <path d="M44,540 Q140,510 240,520 Q330,535 400,510 Q470,495 540,520 Q575,535 600,525" fill="none" stroke="#8faa7e" stroke-width="0.8" opacity="0.5"/>

  <path d="M44,490 Q150,465 260,475 Q340,490 420,465 Q490,450 560,475 Q585,490 600,480" fill="none" stroke="#8faa7e" stroke-width="0.8" opacity="0.5"/>

  <path d="M44,455 Q160,440 280,445 Q370,455 440,440 Q510,430 570,445 Q590,455 600,450" fill="none" stroke="#8faa7e" stroke-width="0.6" opacity="0.4"/>

  <!-- Roads -->
  <line x1="100" y1="440" x2="100" y2="820" stroke="#d6d3c8" stroke-width="3"/>
  <line x1="44" y1="580" x2="600" y2="580" stroke="#d6d3c8" stroke-width="3"/>
  <line x1="300" y1="440" x2="300" y2="820" stroke="#d6d3c8" stroke-width="2" stroke-dasharray="8,4"/>

